name: Bug report
description: Something in KestraVault doesn't work the way it should.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! A minute of detail here usually saves a round-trip later.
        (Security vulnerabilities: please **don't** open an issue — see [SECURITY.md](../blob/main/SECURITY.md).)
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: |
        1. Open a note with …
        2. Click …
        3. Expected …, but got …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: KestraVault version
      description: Settings → About (e.g. 0.1.0), or the commit hash if running from source.
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
        - Linux
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: How are you running it?
      options:
        - Downloaded installer (GitHub release)
        - From source (pnpm dev:desktop)
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: AI provider (if AI-related)
      options:
        - Not AI-related
        - Claude subscription
        - Anthropic API
        - OpenAI
        - OpenRouter
        - Ollama (local)
        - LM Studio (local)
        - Custom endpoint
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: |
        Anything from View → Toggle Developer Tools → Console, or a screenshot.
        **Never paste API keys.**
