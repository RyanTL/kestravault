name: CI

on:
  push:
    branches: [main]
  pull_request:

# AGENTS.md gates: typecheck, lint, and test MUST pass before a PR merges.
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  # Secret scan over the full git history (.gitleaks.toml; same scan as
  # scripts/secret-sweep.sh). Part of the pre-flip sweep in plan/launch-v1.md —
  # keeps new pushes clean so the launch-day audit stays boring.
  secret-scan:
    runs-on: ubuntu-latest
    # gitleaks-action reads the PR commit list, which needs pull-requests: read
    # on top of the default read-only token.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — the whole point

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
